kind = "web"
previewPath = "/"
title = "VectorVest Community"
version = "1.0.0"
id = "artifacts/community"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21400

[services.development]
run = "pnpm --filter @workspace/community run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/community", "run", "build" ]
serve = "static"
publicDir = "artifacts/community/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21400"
BASE_PATH = "/"
