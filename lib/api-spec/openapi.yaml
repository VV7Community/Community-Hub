openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 1.0.0
  description: VectorVest Community Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: channels
  - name: messages
  - name: users
  - name: webinars
  - name: events
  - name: university
  - name: admin

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /channels:
    get:
      operationId: listChannels
      tags: [channels]
      summary: List all channels
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Channel"
        "401":
          description: Unauthorized

  /channels/{channelId}/messages:
    get:
      operationId: getChannelMessages
      tags: [messages]
      summary: Get messages for a channel
      security: [{ cookieAuth: [] }]
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
        - name: before
          in: query
          required: false
          schema:
            type: integer
          description: Cursor for pagination - get messages before this message ID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Channel not found

    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message to a channel
      security: [{ cookieAuth: [] }]
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "403":
          description: Channel is read-only

  /messages/{messageId}:
    delete:
      operationId: deleteMessage
      tags: [messages]
      summary: Delete a message
      security: [{ cookieAuth: [] }]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /messages/{messageId}/pin:
    put:
      operationId: pinMessage
      tags: [messages]
      summary: Pin or unpin a message (admin only)
      security: [{ cookieAuth: [] }]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PinMessageInput"
      responses:
        "200":
          description: Updated message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /messages/{messageId}/reactions:
    post:
      operationId: addReaction
      tags: [messages]
      summary: Add or toggle a reaction on a message
      security: [{ cookieAuth: [] }]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReactionInput"
      responses:
        "200":
          description: Reaction toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized

  /messages/{messageId}/reactions/{emoji}:
    delete:
      operationId: removeReaction
      tags: [messages]
      summary: Remove a specific reaction from a message
      security: [{ cookieAuth: [] }]
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
        - name: emoji
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reaction removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "401":
          description: Unauthorized

  /channels/{channelId}/pinned:
    get:
      operationId: getPinnedMessage
      tags: [channels]
      summary: Get the pinned message for a channel
      security: [{ cookieAuth: [] }]
      parameters:
        - name: channelId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pinned message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "404":
          description: No pinned message

  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user profile
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized
    put:
      operationId: updateMe
      tags: [users]
      summary: Update current user profile
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "401":
          description: Unauthorized

  /users/online:
    get:
      operationId: getOnlineUsers
      tags: [users]
      summary: Get online users
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Online users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnlineUsersResponse"
        "401":
          description: Unauthorized

  /events/sync:
    post:
      operationId: syncEvents
      tags: [events]
      summary: Scrape and refresh VectorVest EU events (admin only)
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Number of events synced
          content:
            application/json:
              schema:
                type: object
                required: [synced]
                properties:
                  synced:
                    type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "502":
          description: Could not reach external events page

  /translate:
    post:
      operationId: translateText
      tags: [messages]
      summary: Translate a text snippet to the user's preferred language
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslateRequest"
      responses:
        "200":
          description: Translated text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TranslateResponse"
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "429":
          description: Translation quota exceeded

  /webinars:
    get:
      operationId: listWebinars
      tags: [webinars]
      summary: List webinars
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Webinars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Webinar"
        "401":
          description: Unauthorized

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List events
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
        "401":
          description: Unauthorized

  /university/courses:
    get:
      operationId: listCourses
      tags: [university]
      summary: List university courses
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Course"
        "401":
          description: Unauthorized

  /admin/members:
    get:
      operationId: listMembers
      tags: [admin]
      summary: List members, optionally filtered by membership status
      security: [{ cookieAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, verified, rejected]
      responses:
        "200":
          description: Members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemberSummary"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/members/{userId}/verify:
    post:
      operationId: verifyMember
      tags: [admin]
      summary: Manually mark a member as verified VectorVest customer
      security: [{ cookieAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyMemberInput"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberSummary"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /admin/members/{userId}/reject:
    post:
      operationId: rejectMember
      tags: [admin]
      summary: Manually reject a member's VectorVest membership claim
      security: [{ cookieAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectMemberInput"
      responses:
        "200":
          description: Updated member
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberSummary"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

  /admin/allowlist:
    get:
      operationId: listAllowlist
      tags: [admin]
      summary: List the VectorVest member email allowlist
      security: [{ cookieAuth: [] }]
      responses:
        "200":
          description: Allowlist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AllowlistEntry"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
    post:
      operationId: addAllowlistEntry
      tags: [admin]
      summary: Add an email to the VectorVest member allowlist
      security: [{ cookieAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AllowlistEntryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllowlistEntry"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden

  /admin/allowlist/{id}:
    delete:
      operationId: removeAllowlistEntry
      tags: [admin]
      summary: Remove an email from the VectorVest member allowlist
      security: [{ cookieAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Not found

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: __session

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Channel:
      type: object
      required: [id, name, description, category, writable, icon]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [INFO, COMMUNITY]
        postPermission:
          type: string
          enum: [all, admin]
        writable:
          type: boolean
          description: Whether the requesting user can post in this channel right now
        icon:
          type: string
        unreadCount:
          type: integer

    Message:
      type: object
      required: [id, channelId, userId, username, authorRole, content, createdAt, reactions, isPinned]
      properties:
        id:
          type: integer
        channelId:
          type: string
        userId:
          type: string
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        authorRole:
          type: string
          enum: [admin, member]
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        reactions:
          type: array
          items:
            $ref: "#/components/schemas/ReactionGroup"
        isPinned:
          type: boolean

    PinMessageInput:
      type: object
      required: [pinned]
      properties:
        pinned:
          type: boolean

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 4000

    ReactionGroup:
      type: object
      required: [emoji, count, userReacted]
      properties:
        emoji:
          type: string
        count:
          type: integer
        userReacted:
          type: boolean

    ReactionInput:
      type: object
      required: [emoji]
      properties:
        emoji:
          type: string

    UserProfile:
      type: object
      required: [userId, username, role, membershipStatus, language]
      properties:
        userId:
          type: string
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        membershipStatus:
          type: string
          enum: [pending, verified, rejected]
        language:
          type: string
          enum: [nl, fr]
          default: nl

    UserProfileUpdate:
      type: object
      properties:
        username:
          type: string
          minLength: 2
        language:
          type: string
          enum: [nl, fr]

    OnlineUsersResponse:
      type: object
      required: [count, users]
      properties:
        count:
          type: integer
        users:
          type: array
          items:
            $ref: "#/components/schemas/OnlineUser"

    OnlineUser:
      type: object
      required: [userId, username]
      properties:
        userId:
          type: string
        username:
          type: string
        avatarUrl:
          type: ["string", "null"]

    Webinar:
      type: object
      required: [id, title, description, hostName, scheduledAt, status]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        hostName:
          type: string
        scheduledAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [upcoming, live, past]
        thumbnailUrl:
          type: ["string", "null"]
        sessionNumber:
          type: ["integer", "null"]

    Event:
      type: object
      required: [id, title, description, date]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        location:
          type: ["string", "null"]
        type:
          type: string
        sourceUrl:
          type: ["string", "null"]

    TranslateRequest:
      type: object
      required: [text, targetLanguage]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4000
        targetLanguage:
          type: string
          enum: [nl, fr]

    TranslateResponse:
      type: object
      required: [translatedText]
      properties:
        translatedText:
          type: string

    Course:
      type: object
      required: [id, title, description, instructor, level]
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        instructor:
          type: string
        duration:
          type: ["string", "null"]
        level:
          type: string
          enum: [beginner, intermediate, advanced]
        videoUrl:
          type: ["string", "null"]
        thumbnailUrl:
          type: ["string", "null"]
        isLocked:
          type: boolean

    MemberSummary:
      type: object
      required: [userId, username, email, role, membershipStatus, membershipMethod, membershipVerifiedAt, createdAt]
      properties:
        userId:
          type: string
        username:
          type: string
        email:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        role:
          type: string
          enum: [admin, member]
        membershipStatus:
          type: string
          enum: [pending, verified, rejected]
        membershipMethod:
          type: ["string", "null"]
        membershipVerifiedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    VerifyMemberInput:
      type: object
      properties:
        vectorVestMemberId:
          type: string

    RejectMemberInput:
      type: object
      properties:
        reason:
          type: string

    AllowlistEntry:
      type: object
      required: [id, email, vectorVestMemberId, addedBy, addedAt, notes]
      properties:
        id:
          type: integer
        email:
          type: string
        vectorVestMemberId:
          type: ["string", "null"]
        addedBy:
          type: string
        addedAt:
          type: string
          format: date-time
        notes:
          type: ["string", "null"]

    AllowlistEntryInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        vectorVestMemberId:
          type: string
        notes:
          type: string
